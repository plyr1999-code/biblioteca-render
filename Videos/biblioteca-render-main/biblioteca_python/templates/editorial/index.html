{% extends 'base.html' %}
{% block title %}Editorial{% endblock %}
{% block content %}
<div class="app-title">
    <div><h1><i class="fa fa-tags"></i> Editorial</h1></div>
    <div class="app-title-actions">
        {% if session.get('id_usuario') == 1 %}
        <button class="btn btn-primary mb-2" onclick="frmEditorial()"><i class="fa fa-plus"></i> Nuevo</button>
        {% endif %}
        <button class="btn btn-sm btn-export btn-pdf mb-2" onclick="exportarReporte('pdf')"><i class="fa fa-file-pdf-o"></i> PDF</button>
        <button class="btn btn-sm btn-export btn-excel mb-2" onclick="exportarReporte('excel')"><i class="fa fa-file-excel-o"></i> Excel</button>
        <button class="btn btn-sm btn-export btn-word mb-2" onclick="exportarReporte('word')"><i class="fa fa-file-word-o"></i> Word</button>
    </div>
</div>

<!-- Filtro de Estado -->
<div class="row mb-3">
    <div class="col-lg-12">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white" data-toggle="collapse" href="#collapseFiltrosEd" style="cursor: pointer;">
                <h5 class="mb-0"><i class="fa fa-filter"></i> Filtros <i class="fa fa-angle-down float-right"></i></h5>
            </div>
            <div id="collapseFiltrosEd" class="collapse show">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>Estado</label>
                                <select class="form-control" id="filtroEstEd">
                                    <option value="">Todos</option>
                                    <option value="1">Activos</option>
                                    <option value="0">Inactivos</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <div class="form-group">
                                <button class="btn btn-secondary mr-1" onclick="limpiarFiltrosEd()"><i class="fa fa-eraser"></i> Limpiar</button>
                                <button class="btn btn-primary" onclick="aplicarFiltrosEd()"><i class="fa fa-search"></i> Filtrar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="row"><div class="col-lg-12"><div class="tile"><div class="tile-body">
    <div class="table-responsive">
        <table class="table table-bordered table-hover" id="tblEditorial">
            <thead class="thead-dark"><tr><th>Id</th><th>Editorial</th><th>Estado</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div></div></div></div>

<div id="modal_editorial" class="modal fade" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title text-white" id="titleEditorial">Nueva Editorial</h5>
            <button class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body">
            <form id="frmEditorial">
                <input type="hidden" id="id_editorial" name="id">
                <div class="form-group"><label>Nombre Editorial</label>
                    <input class="form-control" type="text" name="editorial" id="editorialInput" placeholder="Editorial"></div>
                <button class="btn btn-primary" type="button" onclick="registrarEditorial(event)">Guardar</button>
                <button class="btn btn-danger" type="button" data-dismiss="modal">Cancelar</button>
            </form>
        </div>
    </div></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$('#editorialInput').attr({required:true, minlength:2, maxlength:100, pattern:'[A-Za-zÁÉÍÓÚáéíóúÑñ0-9\\s.,:;()\\-\'"/#]{2,100}'});
var tableEd = $('#tblEditorial').DataTable({
    ajax:{
        url:'/Editorial/listar',
        dataSrc:'',
        data: function(d) { d.estado = $('#filtroEstEd').val(); }
    },
    columns:[{data:'id'},{data:'editorial'},
        {data:null,render:function(d){return d.estadoLabel==='Activo'?'<span class="badge badge-success">Activo</span>':'<span class="badge badge-danger">Inactivo</span>';}},
        {data:null,render:function(d){
            if(d.acciones==='editar,eliminar') return '<button class="btn btn-primary btn-sm" onclick="btnEd('+d.id+')"><i class="fa fa-pencil-square-o"></i></button> <button class="btn btn-danger btn-sm" onclick="btnDelEd('+d.id+')"><i class="fa fa-trash-o"></i></button>';
            if(d.acciones==='reingresar') return '<button class="btn btn-success btn-sm" onclick="btnRestEd('+d.id+')"><i class="fa fa-reply-all"></i></button>';
            return '<span class="text-muted">—</span>';
        }}]
});
function frmEditorial(){$('#titleEditorial').text('Nueva Editorial');$('#frmEditorial')[0].reset();$('#id_editorial').val('');$('#modal_editorial').modal('show');}
function registrarEditorial(e){e.preventDefault();if(!validarFormulario('#frmEditorial')) return;$.post('/Editorial/registrar',$('#frmEditorial').serialize(),function(r){swal(r.msg,'',r.icono);if(r.icono==='success'){$('#modal_editorial').modal('hide');tableEd.ajax.reload();}});}
function btnEd(id){$.get('/Editorial/editar/'+id,function(d){$('#titleEditorial').text('Editar Editorial');$('#id_editorial').val(d.id);$('#editorialInput').val(d.editorial);$('#modal_editorial').modal('show');});}
function btnDelEd(id){swal({title:'¿Dar de baja?',icon:'warning',buttons:true,dangerMode:true}).then(function(ok){if(ok)$.get('/Editorial/eliminar/'+id,function(r){swal(r.msg,'',r.icono);tableEd.ajax.reload();});});}
function btnRestEd(id){$.get('/Editorial/reingresar/'+id,function(r){swal(r.msg,'',r.icono);tableEd.ajax.reload();});}
function aplicarFiltrosEd() { tableEd.ajax.reload(); }
function limpiarFiltrosEd() { $('#filtroEstEd').val(''); tableEd.ajax.reload(); }
function exportarReporte(tipo) {
    var estado = $('#filtroEstEd').val();
    var params = new URLSearchParams();
    if (estado) params.append('estado', estado);
    var url = '/Editorial/' + tipo + (params.toString() ? '?' + params.toString() : '');
    if (tipo === 'pdf') { window.open(url, '_blank'); }
    else { window.location.href = url; }
}
</script>
{% endblock %}
