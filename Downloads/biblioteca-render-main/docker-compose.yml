version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: biblioteca_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biblioteca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./biblioteca_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biblioteca_network

  redis:
    image: redis:7-alpine
    container_name: biblioteca_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biblioteca_network

  app:
    build: .
    container_name: biblioteca_app
    environment:
      FLASK_ENV: production
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: biblioteca
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-here-change-this
      JWT_SECRET: your-jwt-secret-key-here-change-this
    ports:
      - "5000:5000"
    volumes:
      - ./biblioteca_python/logs:/app/logs
      - ./biblioteca_python/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - biblioteca_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  biblioteca_network:
    driver: bridge
