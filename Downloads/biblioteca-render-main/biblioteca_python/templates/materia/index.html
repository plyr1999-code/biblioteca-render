{% extends 'base.html' %}
{% block title %}Materias{% endblock %}
{% block content %}
<div class="app-title"><div><h1><i class="fa fa-list-alt"></i> Materias / Categorías</h1></div></div>
{% if session.get('id_usuario') == 1 %}
<button class="btn btn-primary mb-2" onclick="frmMateria()"><i class="fa fa-plus"></i> Nuevo</button>
{% endif %}
<div class="row"><div class="col-lg-12"><div class="tile"><div class="tile-body">
    <div class="table-responsive">
        <table class="table table-bordered table-hover" id="tblMaterias">
            <thead class="thead-dark"><tr><th>Id</th><th>Materia</th><th>Estado</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div></div></div></div>

<div id="modal_materia" class="modal fade" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title text-white" id="titleMat">Nueva Materia</h5>
            <button class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body">
            <form id="frmMateria">
                <input type="hidden" id="id_mat" name="id">
                <div class="form-group"><label>Nombre Materia/Categoría</label>
                    <input class="form-control" type="text" name="materia" id="materiaInput" placeholder="Materia"></div>
                <button class="btn btn-primary" type="button" onclick="registrarMateria(event)">Guardar</button>
                <button class="btn btn-danger" type="button" data-dismiss="modal">Cancelar</button>
            </form>
        </div>
    </div></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$('#materiaInput').attr({required:true, minlength:2, maxlength:100, pattern:'[A-Za-zÁÉÍÓÚáéíóúÑñ0-9\\s.,:;()\\-\'"/#]{2,100}'});
var tableMat=$('#tblMaterias').DataTable({
    ajax:{url:'/Materia/listar',dataSrc:''},
    columns:[{data:'id'},{data:'materia'},
        {data:null,render:function(d){return d.estadoLabel==='Activo'?'<span class="badge badge-success">Activo</span>':'<span class="badge badge-danger">Inactivo</span>';}},
        {data:null,render:function(d){
            if(d.acciones==='editar,eliminar') return '<button class="btn btn-primary btn-sm" onclick="btnMat('+d.id+')"><i class="fa fa-pencil-square-o"></i></button> <button class="btn btn-danger btn-sm" onclick="btnDelMat('+d.id+')"><i class="fa fa-trash-o"></i></button>';
            if(d.acciones==='reingresar') return '<button class="btn btn-success btn-sm" onclick="btnRestMat('+d.id+')"><i class="fa fa-reply-all"></i></button>';
            return '<span class="text-muted">—</span>';
        }}]
});
function frmMateria(){$('#titleMat').text('Nueva Materia');$('#frmMateria')[0].reset();$('#id_mat').val('');$('#modal_materia').modal('show');}
function registrarMateria(e){e.preventDefault();if(!validarFormulario('#frmMateria')) return;$.post('/Materia/registrar',$('#frmMateria').serialize(),function(r){swal(r.msg,'',r.icono);if(r.icono==='success'){$('#modal_materia').modal('hide');tableMat.ajax.reload();}});}
function btnMat(id){$.get('/Materia/editar/'+id,function(d){$('#titleMat').text('Editar Materia');$('#id_mat').val(d.id);$('#materiaInput').val(d.materia);$('#modal_materia').modal('show');});}
function btnDelMat(id){swal({title:'¿Dar de baja?',icon:'warning',buttons:true,dangerMode:true}).then(function(ok){if(ok)$.get('/Materia/eliminar/'+id,function(r){swal(r.msg,'',r.icono);tableMat.ajax.reload();});});}
function btnRestMat(id){$.get('/Materia/reingresar/'+id,function(r){swal(r.msg,'',r.icono);tableMat.ajax.reload();});}
</script>
{% endblock %}
